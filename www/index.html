<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>טקס בוקר</title>
  <style>
    :root { --bg:#f5efe6; --card:#fffdfa; --ink:#3a3630; --soft:#7a7266; --accent:#b08d6a; --accent-d:#8f6f4e; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; height:100%; }
    body {
      font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:radial-gradient(120% 90% at 50% 0%, #faf6ef 0%, var(--bg) 60%, #ece2d3 100%);
      color:var(--ink); display:flex; align-items:center; justify-content:center;
      padding:24px; min-height:100%;
    }
    .card {
      background:var(--card); width:100%; max-width:440px; border-radius:24px;
      padding:34px 26px 28px; box-shadow:0 18px 50px rgba(90,70,45,.12); text-align:center;
    }
    .sun { font-size:46px; margin-bottom:4px; }
    h1 { font-size:23px; margin:6px 0 4px; font-weight:600; }
    .sub { color:var(--soft); font-size:15px; margin:0 0 22px; line-height:1.6; }
    label { display:block; text-align:right; color:var(--soft); font-size:14px; margin:18px 4px 6px; }
    input[type=time] {
      width:100%; padding:14px; font-size:20px; border:1.5px solid #e4d8c6; border-radius:12px;
      background:#fdfbf7; color:var(--ink); text-align:center; font-family:inherit;
    }
    button {
      width:100%; border:0; border-radius:14px; padding:16px; font-size:17px; font-weight:600;
      background:var(--accent); color:#fff; margin-top:14px; font-family:inherit; cursor:pointer;
      transition:transform .08s ease;
    }
    button:active { transform:scale(.985); }
    button.secondary { background:transparent; color:var(--accent-d); border:1.5px solid #e4d8c6; }
    .status {
      margin-top:20px; padding:14px 16px; border-radius:12px; background:#f3ede3;
      font-size:14px; color:var(--soft); line-height:1.65; text-align:right; white-space:pre-wrap;
    }
    .status.ok { background:#eaf2e7; color:#4a6b45; }
    .status.err { background:#f7e9e6; color:#9a5040; }
    .hr { height:1px; background:#eee5d7; margin:24px 0 6px; }
    .note { color:var(--soft); font-size:13px; line-height:1.6; margin-top:14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="sun">🌅</div>
    <h1>טקס בוקר</h1>
    <p class="sub">בדיקה: תזכורת בוקר שקופצת אליך לבד,<br>גם כשהאפליקציה סגורה — בלי אינטרנט, בלי שרת.</p>

    <button id="testBtn">🔔 שלח לי התראת ניסיון (בעוד 10 שניות)</button>

    <label for="time">שעת התזכורת היומית</label>
    <input type="time" id="time" value="07:00">
    <button id="dailyBtn" class="secondary">קבע תזכורת יומית לשעה הזו</button>

    <div id="status" class="status">טוען…</div>

    <div class="hr"></div>
    <p class="note">אם ההתראה קופצת אמין — זה הבסיס לאפליקציה האמיתית.</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
